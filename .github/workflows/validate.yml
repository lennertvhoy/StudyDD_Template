name: Validate StudyDD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run environment check
        run: python scripts/check_environment.py

      - name: Run cross-platform path tests
        run: python scripts/test_cross_platform_paths.py

      - name: Run validator
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/check_studydd.py

      - name: Run instantiation smoke test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_instantiate_template.py

      - name: Run study-loop smoke test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_study_loop_smoke.py

      - name: Run demo replay test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_demo_replay.py

      - name: Run compact state test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_compact_state.py

      - name: Run context pack test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_context_pack.py

      - name: Run study skills test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_study_skills.py

      - name: Run performance policy test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_performance_policy.py

      - name: Run targeted validator test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_validate_touched_state.py

      - name: Run source freshness test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_source_freshness.py

      - name: Run question quality test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_question_quality.py

      - name: Run learner adaptation test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_learner_adaptation.py

      - name: Check source freshness for demo target
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/check_source_freshness.py --target-id demo-ai-search-exam --now "2026-06-24T12:00:00+00:00"

      - name: Lint questions
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/lint_questions.py

      - name: Run study adjustment demo
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/suggest_study_adjustment.py --demo

      - name: Run learning activities test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_learning_activities.py

      - name: Run next activity decision test
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/test_next_activity_decision.py

      - name: Run activity planner demo
        if: matrix.os == 'ubuntu-latest'
        run: python scripts/plan_learning_activity.py --demo

      - name: Check whitespace
        if: matrix.os == 'ubuntu-latest'
        run: git diff --check
