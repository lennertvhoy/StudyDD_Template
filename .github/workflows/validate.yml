name: Validate StudyDD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run validator
        run: python3 scripts/check_studydd.py

      - name: Run instantiation smoke test
        run: python3 scripts/test_instantiate_template.py

      - name: Run study-loop smoke test
        run: python3 scripts/test_study_loop_smoke.py

      - name: Check whitespace
        run: git diff --check
