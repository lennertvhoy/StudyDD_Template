name: Validate StudyDD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run validator
        run: python3 scripts/check_studydd.py

      - name: Run instantiation smoke test
        run: python3 scripts/test_instantiate_template.py

      - name: Run study-loop smoke test
        run: python3 scripts/test_study_loop_smoke.py

      - name: Run demo replay test
        run: python3 scripts/test_demo_replay.py

      - name: Run compact state test
        run: python3 scripts/test_compact_state.py

      - name: Run context pack test
        run: python3 scripts/test_context_pack.py

      - name: Run study skills test
        run: python3 scripts/test_study_skills.py

      - name: Run performance policy test
        run: python3 scripts/test_performance_policy.py

      - name: Run targeted validator test
        run: python3 scripts/test_validate_touched_state.py

      - run: python3 scripts/test_source_freshness.py
      - run: python3 scripts/test_question_quality.py
      - run: python3 scripts/test_learner_adaptation.py
      - run: python3 scripts/check_source_freshness.py --target-id demo-ai-search-exam --now "2026-06-24T12:00:00+00:00"
      - run: python3 scripts/lint_questions.py
      - run: python3 scripts/suggest_study_adjustment.py --demo

      - name: Check whitespace
        run: git diff --check
