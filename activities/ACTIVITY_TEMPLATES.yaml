---
# StudyDD activity templates.
#
# Each template declares an activity type, the study domains it works best for,
# and the evidence formats the learner should submit. Agents use these templates
# to plan the next learning activity.

metadata:
  template_version: "0.9.0"
  last_updated: "2026-06-24"
  updated_by: "coding-agent"

activity_types:
  retrieval_question:
    description: "One direct question or exam-style scenario."
  spaced_review:
    description: "Due or overdue review based on time-aware spaced repetition."
  paper_exercise:
    description: "Learner solves work on paper, then uploads a photo or types the result."
  external_platform_exercise:
    description: "Learner completes exercises on another platform and uploads score, screenshot, notes, or answers."
  video_or_reading_task:
    description: "Learner watches, reads, or studies a selected resource, then submits a short summary or answers a check question."
  practical_lab:
    description: "Learner performs a technical task, command, configuration, troubleshooting step, or build."
  explain_back:
    description: "Learner explains the idea back in their own words."
  diagram_or_whiteboard:
    description: "Learner draws a model, flow, topology, argument map, architecture, or solution."
  interview_prep:
    description: "Learner answers realistic interview questions, STAR stories, technical explanations, follow-ups, or role-fit prompts."
  presentation_prep:
    description: "Learner rehearses a presentation, pitch, class explanation, demo talk, or oral exam answer."
  voice_note_review:
    description: "Learner uploads or provides a transcript/voice note for review of structure, clarity, correctness, pacing, filler words if transcript is available, and target fit."
  writing_or_essay_review:
    description: "Learner submits a written answer, essay, reflection, explanation, or draft for feedback."
  upload_and_review:
    description: "Generic evidence intake for screenshots, PDFs, photos, notes, logs, transcripts, or external work."

templates:
  - id: paper_drill_basic
    activity_type: paper_exercise
    best_for:
      - primary_math
      - calculation
    expected_evidence:
      - photo
      - answer_sheet

  - id: official_doc_reading
    activity_type: video_or_reading_task
    best_for:
      - it_certification
      - volatile_topic
    expected_evidence:
      - short_summary
      - answer_to_check_question

  - id: lab_screenshot_review
    activity_type: practical_lab
    best_for:
      - sysadmin
      - cloud
      - networking
    expected_evidence:
      - screenshot
      - command_output
      - explanation

  - id: explain_back
    activity_type: explain_back
    best_for:
      - philosophy
      - conceptual_understanding
      - interview_prep
    expected_evidence:
      - written_explanation
      - transcript

  - id: interview_star_answer
    activity_type: interview_prep
    best_for:
      - interview_prep
      - behavioral_question
    expected_evidence:
      - written_answer
      - transcript

  - id: presentation_rehearsal_transcript
    activity_type: presentation_prep
    best_for:
      - presentation_prep
      - oral_explanation
    expected_evidence:
      - transcript
      - outline
      - timing_notes

  - id: voice_note_review
    activity_type: voice_note_review
    best_for:
      - interview_prep
      - presentation_prep
      - language_learning
      - oral_exam
    expected_evidence:
      - transcript
      - voice_note

  - id: external_platform_drill
    activity_type: external_platform_exercise
    best_for:
      - it_certification
      - language_learning
      - primary_math
    expected_evidence:
      - external_score
      - screenshot
      - notes

  - id: argument_map_drawing
    activity_type: diagram_or_whiteboard
    best_for:
      - philosophy
      - conceptual_understanding
    expected_evidence:
      - whiteboard_diagram
      - photo

  - id: writing_or_essay_review
    activity_type: writing_or_essay_review
    best_for:
      - philosophy
      - interview_prep
      - language_learning
    expected_evidence:
      - essay
      - written_answer
