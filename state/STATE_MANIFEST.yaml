---
# StudyDD State Manifest
#
# Declares the role of important state files so agents and validators know
# whether a file is canonical truth, append-only audit, or derived summary.
#
# Roles:
#   - canonical          : small machine-readable current truth; load first.
#   - append_only_audit  : historical log; never delete; not default context.
#   - derived_summary    : generated compact view; safe to regenerate.
#   - derived_index      : generated lookup; safe to regenerate.
#   - generated_context  : task-specific runtime context; safe to regenerate.
#   - protected          : required for repo health.
#
# Boundary (template vs instance):
#   - template           : generic repo infrastructure; must stay identical and
#                          unpersonalized in every clone.
#   - instance           : learner-specific state; empty/generic placeholder in
#                          template mode, populated only in learner instances.
#   - generated          : derived context/index; regenerated by scripts, content
#                          differs between template and instance but produced
#                          automatically.
#
# Agents must check `boundary` before writing. If `boundary: instance` and the
# repo is in template mode, stop and use `scripts/create_instance.py`.

manifest_version: "1.1"
last_updated: "2026-06-29"
generated_by: "manual"

files:
  state/STUDY_STATE.yaml:
    role: canonical
    boundary: instance
    load_default: true
    protected: true
  state/SKILL_MAP.yaml:
    role: canonical
    boundary: instance
    load_default: true
    protected: true
  reviews/REVIEW_STATE.yaml:
    role: canonical
    boundary: instance
    load_default: true
    protected: true
  state/STUDYDD_MODE.yaml:
    role: canonical
    boundary: template
    load_default: true
    protected: true
  state/STUDYDD_TEMPLATE_VERSION.yaml:
    role: canonical
    boundary: template
    load_default: true
    protected: true
  sources/SOURCE_STATE.yaml:
    role: canonical
    boundary: instance
    load_default: true
    protected: true
  state/LEARNER_PROFILE.yaml:
    role: canonical
    boundary: instance
    load_default: true
    protected: true
  state/EVIDENCE_LOG.md:
    role: append_only_audit
    boundary: instance
