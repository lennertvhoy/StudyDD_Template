  sessions/SESSION_SUMMARIES.md:
    role: derived_summary
    boundary: generated
    load_default: true
    generated_by: scripts/compact_state.py
  state/STATE_MANIFEST.yaml:
    role: canonical
    boundary: template
    load_default: true
    protected: true
  state/ACTIVITY_STATE.yaml:
    role: canonical
    boundary: instance
    load_default: true
    protected: true
